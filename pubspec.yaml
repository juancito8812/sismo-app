name: sismo_ve
description: App de alertas sísmicas para Venezuela - SismoVE
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  html: ^0.15.4
  sqflite: ^2.3.0
  path: ^1.9.0
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.5.1
  geolocator: ^10.1.0
  permission_handler: ^11.0.0
  intl: ^0.19.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  csv: ^5.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
