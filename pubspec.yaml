name: sismo_ve
description: App de alertas sísmicas para Venezuela - SismoVE
version: 1.0.0+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  sqflite: ^2.3.0
  path: ^1.9.0
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.5.1
  intl: ^0.19.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  csv: ^5.1.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  audioplayers: ^6.0.0
  torch_light: ^1.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
