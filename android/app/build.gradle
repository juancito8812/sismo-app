plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.juancito8812.sismo_ve"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.juancito8812.sismo_ve"
        minSdk = 23
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    signingConfigs {
        // Se usa un keystore local generado automáticamente para debug, no signingConfigs.debug.
        // Diferencias:
        // - signingConfigs.debug: keystore global del SDK (~/.android/debug.keystore), validez 1 año, alias androiddebugkey.
        // - Este customDebug: keystore local del proyecto (por si falla/solapa el SDK), genera buid si falta,
        //   aisla signing del debug del proyecto y evita conflictos en CI/multi-usuario.
        registerCustomDebug {
            storeFile file("${rootProject.rootDir}/debug.jks")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.registerCustomDebug
        }
        release {
            // TODO: Add your own signing config for the release build.
            signingConfig signingConfigs.registerCustomDebug
        }
    }
}

flutter {
    source = "../.."
}

def localDebugKeystore = file("${rootProject.rootDir}/debug.jks")
if (!localDebugKeystore.exists()) {
    tasks.register('generateLocalDebugKeystore') {
        group = 'build'
        description = 'Genera debug keystore local del proyecto si falta'
        doLast {
            localDebugKeystore.parentFile.mkdirs()
            exec {
                commandLine 'keytool', '-genkey', '-v',
                    '-keystore', localDebugKeystore,
                    '-storepass', 'android',
                    '-alias', 'androiddebugkey',
                    '-keypass', 'android',
                    '-keyalg', 'RSA',
                    '-keysize', '2048',
                    '-validity', '10000',
                    '-dname', 'CN=Android Debug,O=Android,C=US'
            }
        }
        outputs.file localDebugKeystore
    }
    tasks.named('preBuild').configure {
        dependsOn 'generateLocalDebugKeystore'
    }
}
